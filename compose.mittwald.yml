services:
  diggy:
    image: ghcr.io/shadowfps/diggy-easydns:latest
    restart: unless-stopped
    ports:
      - "3001:3001/tcp"
    environment:
      NODE_ENV: production
      PORT: "3001"
      TRUST_PROXY: "true"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
