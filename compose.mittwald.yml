services:
  diggy:
    image: ghcr.io/shadowfps/diggy-easydns:latest
    restart: unless-stopped
    ports:
      - "3001:3001/tcp"
    environment:
      NODE_ENV: production
      PORT: "3001"
      TRUST_PROXY: "true"
      # Runtime-Secrets werden beim Deploy per ${VAR}-Interpolation aus dem
      # --env-file gefüllt (CI: aus GitHub-Secrets, lokal: aus .env). Nur die
      # Namen stehen hier — keine Werte im Repo.
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_TO: ${CONTACT_TO}
      CONTACT_FROM: ${CONTACT_FROM}
      CONTACT_FORM_SECRET: ${CONTACT_FORM_SECRET}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY}
      VIRUS_TOTAL_API_KEY: ${VIRUS_TOTAL_API_KEY}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
