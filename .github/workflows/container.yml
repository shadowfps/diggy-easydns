name: Build and publish container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MITTWALD_STACK_ID: 86540922-d203-4150-8776-9cc4e22352bd
  MITTWALD_CLI_VERSION: v1.20.2

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Diggy
            org.opencontainers.image.description=DNS, SSL and domain audit web application

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  deploy:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mittwald CLI
        run: |
          curl -fsSL -o mw.tgz "https://github.com/mittwald/cli/releases/download/${MITTWALD_CLI_VERSION}/mw-${MITTWALD_CLI_VERSION}-9b7de74-linux-x64.tar.gz"
          tar -xzf mw.tgz
          echo "$PWD/mw/bin" >> "$GITHUB_PATH"

      - name: Deploy stack to Mittwald
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
        run: |
          mw stack deploy \
            --token "$MITTWALD_API_TOKEN" \
            --stack-id "$MITTWALD_STACK_ID" \
            --compose-file compose.mittwald.yml \
            --env-file mittwald.env.example
