name: Build and publish container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MITTWALD_STACK_ID: 86540922-d203-4150-8776-9cc4e22352bd
  MITTWALD_CLI_VERSION: v1.20.2

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Diggy
            org.opencontainers.image.description=DNS, SSL and domain audit web application

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  deploy:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mittwald CLI
        run: |
          curl -fsSL -o mw.tgz "https://github.com/mittwald/cli/releases/download/${MITTWALD_CLI_VERSION}/mw-${MITTWALD_CLI_VERSION}-9b7de74-linux-x64.tar.gz"
          tar -xzf mw.tgz
          echo "$PWD/mw/bin" >> "$GITHUB_PATH"

      - name: Deploy stack to Mittwald
        env:
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
          CONTACT_FROM: ${{ secrets.CONTACT_FROM }}
          CONTACT_FORM_SECRET: ${{ secrets.CONTACT_FORM_SECRET }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          VIRUS_TOTAL_API_KEY: ${{ secrets.VIRUS_TOTAL_API_KEY }}
        run: |
          # Deklarativer Deploy: mw ersetzt die Stack-Env durch das aufgelöste
          # compose.mittwald.yml. Die dortigen ${VAR} werden aus diesem env-file
          # interpoliert; Werte kommen aus GitHub-Secrets (nichts Geheimes im
          # Repo). NODE_ENV/PORT/TRUST_PROXY stehen fest im compose-File.

          # Schutz gegen versehentliches Leer-Deploy (würde die Env überschreiben):
          # fehlt ein Kern-Secret, bricht der Deploy hier ab statt zu wischen.
          : "${SMTP_HOST:?fehlt — GitHub-Secret setzen, sonst wird die Stack-Env geleert}"
          : "${SMTP_USER:?fehlt — GitHub-Secret setzen}"
          : "${SMTP_PASS:?fehlt — GitHub-Secret setzen}"
          : "${CONTACT_TO:?fehlt — GitHub-Secret setzen}"
          : "${CONTACT_FROM:?fehlt — GitHub-Secret setzen}"
          : "${CONTACT_FORM_SECRET:?fehlt — GitHub-Secret setzen}"

          umask 077
          {
            echo "SMTP_HOST=${SMTP_HOST}"
            echo "SMTP_PORT=${SMTP_PORT}"
            echo "SMTP_SECURE=${SMTP_SECURE}"
            echo "SMTP_USER=${SMTP_USER}"
            echo "SMTP_PASS=${SMTP_PASS}"
            echo "CONTACT_TO=${CONTACT_TO}"
            echo "CONTACT_FROM=${CONTACT_FROM}"
            echo "CONTACT_FORM_SECRET=${CONTACT_FORM_SECRET}"
            echo "PAGESPEED_API_KEY=${PAGESPEED_API_KEY}"
            echo "VIRUS_TOTAL_API_KEY=${VIRUS_TOTAL_API_KEY}"
          } > runtime.env

          mw stack deploy \
            --token "$MITTWALD_API_TOKEN" \
            --stack-id "$MITTWALD_STACK_ID" \
            --compose-file compose.mittwald.yml \
            --env-file runtime.env

          rm -f runtime.env
